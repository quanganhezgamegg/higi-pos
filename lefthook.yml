pre-commit:
  parallel: true
  commands:
    eslint:
      glob: "*.{js,ts,tsx}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    prettier:
      glob: "*.{js,ts,tsx,json,css,yml,yaml}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    rustfmt:
      glob: "*.rs"
      run: cargo fmt --manifest-path src-tauri/Cargo.toml
commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
